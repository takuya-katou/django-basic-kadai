{% extends "base.html" %}

{% block title %}商品詳細{% endblock %}

{% block content %}
<h1>商品詳細</h1>
<table class="table table-striped table-hover table-bordered">
   <thead>
       <tr>
           <th>商品名</th>
           <th>価格</th>
           <th>カテゴリ</th>
           <th>商品画像</th>
           <th>商品詳細の説明</th>
       </tr>
   </thead>
   <tbody>
       <tr>
           <td>{{ object.name }}</td>
           <td>{{ object.price }} 円</td>
           <td>{{ object.category  }} </td>
           <td>{{ object.img }} </td>
           <td>{{ object.detail }} </td>
       </tr>
   </tbody>
</table>

{# 戻る #}
<a href="{% url 'list' %}" class="btn btn-secondary">戻る</a>
{% endblock %}
